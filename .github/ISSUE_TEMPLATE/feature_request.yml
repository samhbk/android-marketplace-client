name: Feature request
description: Suggest an improvement or new capability
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem you want solved. For portfolio scope, smaller focused improvements are easier to review.

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What pain point does this address?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like it to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false

  - type: checkboxes
    id: scope
    attributes:
      label: Area
      options:
        - label: UI / Compose
        - label: Networking / auth
        - label: Tests
        - label: Documentation
        - label: CI / tooling
